name: naza_one
description: A private local-first Gemma chat, scanner, and food vision journal.
publish_to: none
version: 1.0.8+9

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  cryptography: ^2.9.0
  crypto: ^3.0.6
  file_selector: ^1.1.0
  flutter_gemma: ^1.3.0
  flutter_gemma_litertlm: ^1.1.0
  flutter_secure_storage: ^10.3.1
  image_picker: ^1.2.3
  path_provider: ^2.1.6
  pqcrypto: ^0.4.0
  sqlite3: ^3.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.18.0

msix_config:
  display_name: Naza One
  publisher_display_name: Naza
  identity_name: Naza.NazaOne
  msix_version: 1.0.8.0
  logo_path: assets/branding/naza_orb_512.png
  capabilities: internetClient
  store: true

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/OFL-Inter.txt
    - assets/fonts/OFL-JetBrainsMono.txt
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter[opsz,wght].ttf
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono[wght].ttf
